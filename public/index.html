<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raamatukogu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Raamatukogu</div>
        <div class="nav-right">
            <div id="auth-section">
                <button class="btn btn-outline" onclick="showLogin()">Logi sisse</button>
                <button class="btn btn-primary" onclick="showSignup()">Registreeru</button>
            </div>
            <div id="user-section" style="display:none;">
                <span id="username-display" class="username"></span>
                <button class="btn btn-outline" onclick="showMyLoans()">Minu laenud</button>
                <button class="btn btn-outline" onclick="logout()">Logi välja</button>
            </div>
        </div>
    </nav>

    <div id="modal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">x</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <div class="container">
        <div class="stats-bar" id="stats-bar"></div>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Otsi pealkirja ja autori järgi..." oninput="searchBooks()">
            <select id="genre-filter" onchange="filterByGenre()">
                <option value="">Kõik žanrid</option>
            </select>
        </div>

        <div id="books-grid" class="books-grid"></div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let currentUser = null;

        async function init() {
            await loadGenres();
            await loadBooks();
            await loadStats();
            if (token) await loadCurrentUser();
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const d = await res.json();
                document.getElementById('stats-bar').innerHTML = `
                    <div class="stat"><span class="stat-num">${d.totalBooks}</span><span class="stat-label">Raamatut kokku</span></div>
                    <div class="stat"><span class="stat-num">${d.availableBooks}</span><span class="stat-label">Saadaval</span></div>
                    <div class="stat"><span class="stat-num">${d.activeLoans}</span><span class="stat-label">Aktiivsed laenud</span></div>
                    <div class="stat"><span class="stat-num">${d.returnedBooks}</span><span class="stat-label">Tagastatud</span></div>
                    <div class="stat"><span class="stat-num">${d.totalUsers}</span><span class="stat-label">Kasutajat</span></div>
                `;
            } catch (err) {
                console.error("Stats loading failed:", err);
            }
        }

        async function loadCurrentUser() {
            try {
                const res = await fetch('/api/users/me', { headers: { 'Authorization': token } });
                if (res.ok) {
                    currentUser = await res.json();
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('user-section').style.display = 'flex';
                    document.getElementById('username-display').textContent = currentUser.name;
                } else { token = null; localStorage.removeItem('token'); }
            } catch {}
        }

        async function loadBooks() {
            const res = await fetch('/api/books');
            const d = await res.json();
            renderBooks(d.books);
        }

        async function searchBooks() {
            const q = document.getElementById('search-input').value;
            document.getElementById('genre-filter').value = '';
            
            if (!q) return loadBooks();
            
            // We send the same string 'q' to both title and author parameters
            const encodedQuery = encodeURIComponent(q);
            const res = await fetch(`/api/books/search?title=${encodedQuery}&author=${encodedQuery}`);
            const d = await res.json();
            
            renderBooks(d.results);
        }

        async function filterByGenre() {
            const genre = document.getElementById('genre-filter').value;
            document.getElementById('search-input').value = '';
            if (!genre) return loadBooks();
            const res = await fetch(`/api/books/genre/${encodeURIComponent(genre)}`);
            const d = await res.json();
            renderBooks(d.books);
        }

        async function loadGenres() {
            const res = await fetch('/api/books/genres');
            const d = await res.json();
            const select = document.getElementById('genre-filter');
            d.genres.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g; opt.textContent = g.charAt(0).toUpperCase() + g.slice(1);
                select.appendChild(opt);
            });
        }

        function renderBooks(books) {
            const grid = document.getElementById('books-grid');
            if (!books || books.length === 0) { grid.innerHTML = '<p class="empty">Raamatuid ei leitud.</p>'; return; }
            grid.innerHTML = books.map(book => `
                <div class="book-card ${!book.available ? 'book-card--unavailable' : ''}">
                    <div class="book-genre">${book.genre}</div>
                    <h3 class="book-title">${book.title}</h3>
                    <div class="book-author">${book.author}</div>
                    <div class="book-year">${book.year}</div>
                    <div class="book-footer">
                        <div class="book-status ${book.available ? 'status-available' : 'status-unavailable'}">
                            ${book.available ? 'Saadaval' : 'Laenatud'}
                        </div>
                        ${book.available && token ? `<button class="btn btn-primary btn-sm" onclick="loanBook(${book.id})">Laena</button>` : ''}
                        ${!book.available && token ? `<button class="btn btn-outline btn-sm" onclick="showBookLoans(${book.id})">Vaata</button>` : ''}
                        ${!token ? `<button class="btn btn-outline btn-sm" onclick="showLogin()">Logi sisse</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function loanBook(bookId) {
            const res = await fetch('/api/loans', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': token },
                body: JSON.stringify({ bookId })
            });
            const d = await res.json();
            if (res.ok) {
                alert(`${d.message} Tagastustähtaeg: ${new Date(d.loan.dueDate).toLocaleDateString('et-EE')}`);
                loadBooks(); loadStats();
            } else {
                alert(d.error);
            }
        }

        async function showMyLoans() {
            const res = await fetch('/api/loans/me', { headers: { 'Authorization': token } });
            const d = await res.json();
            const html = d.loans.length === 0 ? '<p class="empty">Laene pole.</p>' :
                d.loans.map(l => `
                    <div class="loan-card">
                        <div class="loan-header">
                            <strong>${l.bookTitle}</strong>
                            <span class="loan-status ${l.returnedAt ? 'returned' : 'active'}">${l.returnedAt ? 'Tagastatud' : 'Aktiivne'}</span>
                        </div>
                        <div class="loan-dates">
                            Laenatud: ${new Date(l.loanedAt).toLocaleDateString('et-EE')}
                            ${!l.returnedAt ? ` | Tähtaeg: ${new Date(l.dueDate).toLocaleDateString('et-EE')}` : ''}
                        </div>
                        ${!l.returnedAt ? `<button class="btn btn-primary btn-sm" onclick="returnBook(${l.id})">Tagasta</button>` : ''}
                    </div>
                `).join('');
            document.getElementById('modal-content').innerHTML = `<h2>Minu laenud (${d.active} aktiivset)</h2>${html}`;
            document.getElementById('modal').style.display = 'flex';
        }

        async function returnBook(loanId) {
            const res = await fetch(`/api/loans/${loanId}/return`, {
                method: 'POST', headers: { 'Authorization': token }
            });
            const d = await res.json();
            if (res.ok) { closeModal(); loadBooks(); loadStats(); showMyLoans(); }
            else alert(d.error);
        }

        function showLogin() {
            document.getElementById('modal-content').innerHTML = `
                <h2>Logi sisse</h2>
                <div class="form-group"><label>Kasutajanimi</label><input type="text" id="lu" placeholder="kasutajanimi"></div>
                <div class="form-group"><label>Parool</label><input type="password" id="lp" placeholder="parool"></div>
                <div id="le" class="error-msg" style="display:none;"></div>
                <button class="btn btn-primary w-full" onclick="login()">Logi sisse</button>
                <p class="modal-switch">Pole kontot? <a href="#" onclick="showSignup()">Registreeru</a></p>
                <p class="hint">Testikontod: mari / 1234 või jaan / 1234</p>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function showSignup() {
            document.getElementById('modal-content').innerHTML = `
                <h2>Registreeru</h2>
                <div class="form-group"><label>Nimi</label><input type="text" id="sn" placeholder="Sinu nimi"></div>
                <div class="form-group"><label>Kasutajanimi</label><input type="text" id="su" placeholder="kasutajanimi"></div>
                <div class="form-group"><label>Parool</label><input type="password" id="sp" placeholder="parool"></div>
                <div id="se" class="error-msg" style="display:none;"></div>
                <button class="btn btn-primary w-full" onclick="signup()">Registreeru</button>
                <p class="modal-switch">On juba konto? <a href="#" onclick="showLogin()">Logi sisse</a></p>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        async function login() {
            const username = document.getElementById('lu').value;
            const password = document.getElementById('lp').value;
            const err = document.getElementById('le');
            const res = await fetch('/api/users/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const d = await res.json();
            if (res.ok) {
                token = d.token; localStorage.setItem('token', token); currentUser = d.user;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('user-section').style.display = 'flex';
                document.getElementById('username-display').textContent = currentUser.name;
                closeModal(); loadBooks();
            } else { err.textContent = d.error; err.style.display = 'block'; }
        }

        async function signup() {
            const name = document.getElementById('sn').value;
            const username = document.getElementById('su').value;
            const password = document.getElementById('sp').value;
            const err = document.getElementById('se');
            const res = await fetch('/api/users/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, username, password }) });
            const d = await res.json();
            if (res.ok) {
                token = d.token; localStorage.setItem('token', token); currentUser = d.user;
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('user-section').style.display = 'flex';
                document.getElementById('username-display').textContent = currentUser.name;
                closeModal();
            } else { err.textContent = d.error; err.style.display = 'block'; }
        }

        async function logout() {
            await fetch('/api/users/logout', { method: 'POST', headers: { 'Authorization': token } });
            token = null; currentUser = null; localStorage.removeItem('token');
            document.getElementById('auth-section').style.display = 'flex';
            document.getElementById('user-section').style.display = 'none';
            loadBooks();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

        init();
    </script>
</body>
</html>
